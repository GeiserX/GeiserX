<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 340" width="340" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B1A4A"/>
      <stop offset="100%" stop-color="#5C0F32"/>
    </linearGradient>
  </defs>
  <circle cx="170" cy="170" r="160" fill="url(#bg)"/>
  <circle cx="170" cy="170" r="148" fill="none" stroke="#D4A843" stroke-width="3"/>
  <circle cx="170" cy="170" r="140" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.4"/>
  <!-- Cambridge shield simplified -->
  <g transform="translate(170, 100)" text-anchor="middle">
    <text font-family="'Georgia', 'Times New Roman', serif" font-size="20" fill="#D4A843" font-weight="700" letter-spacing="2">CAMBRIDGE</text>
    <text y="24" font-family="'Georgia', 'Times New Roman', serif" font-size="14" fill="#ffffff" opacity="0.8" letter-spacing="1">ENGLISH</text>
  </g>
  <!-- C1 level -->
  <g transform="translate(170, 175)" text-anchor="middle">
    <text font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff">C1</text>
    <text y="40" font-family="'Georgia', 'Times New Roman', serif" font-size="16" fill="#D4A843" letter-spacing="1.5">ADVANCED</text>
  </g>
  <!-- Decorative laurel hints -->
  <path d="M100,280 Q120,250 140,270 Q120,260 100,280" fill="#D4A843" opacity="0.3"/>
  <path d="M240,280 Q220,250 200,270 Q220,260 240,280" fill="#D4A843" opacity="0.3"/>
  <path d="M90,265 Q110,235 130,255 Q110,245 90,265" fill="#D4A843" opacity="0.2"/>
  <path d="M250,265 Q230,235 210,255 Q230,245 250,265" fill="#D4A843" opacity="0.2"/>
</svg>
