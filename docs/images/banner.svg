<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4DB6AC" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00897B" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Stack icons cluster -->
  <g transform="translate(28, 30)">

    <!-- AWS — smile/arrow -->
    <g transform="translate(10, 15)" opacity="0.85">
      <text font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#FF9900" letter-spacing="-0.5">AWS</text>
      <path d="M2,22 Q18,30 34,22" fill="none" stroke="#FF9900" stroke-width="2" stroke-linecap="round"/>
      <path d="M26,20 L34,22 L30,28" fill="none" stroke="#FF9900" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Kubernetes wheel -->
    <g transform="translate(70, 10)" opacity="0.8">
      <circle cx="18" cy="18" r="16" fill="none" stroke="#326CE5" stroke-width="2"/>
      <circle cx="18" cy="18" r="6" fill="#326CE5" opacity="0.3"/>
      <!-- 7 spokes -->
      <line x1="18" y1="2" x2="18" y2="12" stroke="#326CE5" stroke-width="1.8"/>
      <line x1="18" y1="24" x2="18" y2="34" stroke="#326CE5" stroke-width="1.8"/>
      <line x1="2" y1="18" x2="12" y2="18" stroke="#326CE5" stroke-width="1.8"/>
      <line x1="24" y1="18" x2="34" y2="18" stroke="#326CE5" stroke-width="1.8"/>
      <line x1="6" y1="6" x2="13" y2="13" stroke="#326CE5" stroke-width="1.5"/>
      <line x1="23" y1="23" x2="30" y2="30" stroke="#326CE5" stroke-width="1.5"/>
      <line x1="30" y1="6" x2="23" y2="13" stroke="#326CE5" stroke-width="1.5"/>
    </g>

    <!-- Terraform -->
    <g transform="translate(125, 18)" opacity="0.75">
      <!-- Two stacked parallelograms (Terraform logo shape) -->
      <polygon points="0,10 14,2 14,18 0,26" fill="#7B42BC" opacity="0.85"/>
      <polygon points="16,2 30,10 30,26 16,18" fill="#7B42BC" opacity="0.85"/>
      <polygon points="16,20 30,28 30,44 16,36" fill="#7B42BC" opacity="0.6"/>
    </g>

    <!-- Docker whale -->
    <g transform="translate(5, 80)" opacity="0.75">
      <!-- Whale body -->
      <path d="M5,20 C5,10 15,2 30,2 C45,2 50,10 50,18 L50,22 C55,22 58,20 60,17" fill="none" stroke="#2496ED" stroke-width="2" stroke-linecap="round"/>
      <!-- Container boxes on whale -->
      <rect x="12" y="6" width="7" height="6" rx="1" fill="#2496ED" opacity="0.7"/>
      <rect x="21" y="6" width="7" height="6" rx="1" fill="#2496ED" opacity="0.7"/>
      <rect x="30" y="6" width="7" height="6" rx="1" fill="#2496ED" opacity="0.7"/>
      <rect x="21" y="-2" width="7" height="6" rx="1" fill="#2496ED" opacity="0.5"/>
      <rect x="30" y="-2" width="7" height="6" rx="1" fill="#2496ED" opacity="0.5"/>
      <!-- Water line -->
      <path d="M0,24 Q8,20 16,24 Q24,28 32,24 Q40,20 48,24 Q56,28 64,24" fill="none" stroke="#2496ED" stroke-width="1.2" opacity="0.4"/>
    </g>

    <!-- GitHub Actions (gear/play) -->
    <g transform="translate(80, 75)" opacity="0.7">
      <circle cx="16" cy="16" r="14" fill="none" stroke="#ffffff" stroke-width="1.8"/>
      <!-- Gear teeth -->
      <rect x="14" y="0" width="4" height="5" rx="1" fill="#ffffff" opacity="0.6"/>
      <rect x="14" y="27" width="4" height="5" rx="1" fill="#ffffff" opacity="0.6"/>
      <rect x="0" y="14" width="5" height="4" rx="1" fill="#ffffff" opacity="0.6"/>
      <rect x="27" y="14" width="5" height="4" rx="1" fill="#ffffff" opacity="0.6"/>
      <!-- Play triangle in center -->
      <polygon points="12,10 12,22 22,16" fill="#4DB6AC" opacity="0.8"/>
    </g>

    <!-- Go gopher hint -->
    <g transform="translate(130, 80)" opacity="0.65">
      <text font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#00ADD8" letter-spacing="-0.5">Go</text>
    </g>

    <!-- Python -->
    <g transform="translate(130, 115)" opacity="0.5">
      <text font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#3776AB">Python</text>
    </g>

    <!-- Connecting dots between icons -->
    <circle cx="55" cy="50" r="1.5" fill="#4DB6AC" opacity="0.3"/>
    <circle cx="110" cy="60" r="1.5" fill="#4DB6AC" opacity="0.25"/>
    <circle cx="65" cy="75" r="1" fill="#4DB6AC" opacity="0.2"/>
    <line x1="55" y1="50" x2="65" y2="75" stroke="#4DB6AC" stroke-width="0.5" opacity="0.15"/>
    <line x1="65" y1="75" x2="110" y2="60" stroke="#4DB6AC" stroke-width="0.5" opacity="0.15"/>
  </g>

  <!-- Title -->
  <text x="210" y="90" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">
    GeiserX
  </text>

  <!-- Subtitle -->
  <text x="212" y="125" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="17" fill="#4DB6AC" letter-spacing="0.5">
    Senior DevOps Engineer — Cloud &amp; Kubernetes
  </text>

  <!-- Decorative: terminal prompt on right -->
  <g transform="translate(720, 55)" opacity="0.15">
    <rect width="140" height="90" rx="6" fill="#ffffff"/>
    <!-- Title bar dots -->
    <circle cx="14" cy="12" r="3.5" fill="#00897B"/>
    <circle cx="26" cy="12" r="3.5" fill="#00897B" opacity="0.6"/>
    <circle cx="38" cy="12" r="3.5" fill="#00897B" opacity="0.3"/>
    <!-- Terminal lines -->
    <rect x="12" y="28" width="50" height="5" rx="2" fill="#00897B" opacity="0.6"/>
    <rect x="12" y="40" width="80" height="5" rx="2" fill="#00897B" opacity="0.4"/>
    <rect x="12" y="52" width="35" height="5" rx="2" fill="#00897B" opacity="0.6"/>
    <rect x="12" y="64" width="60" height="5" rx="2" fill="#00897B" opacity="0.3"/>
    <!-- Cursor -->
    <rect x="12" y="76" width="8" height="5" rx="1" fill="#4DB6AC" opacity="0.8"/>
  </g>
</svg>
