<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 340" width="340" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CF0A2C"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
  </defs>
  <circle cx="170" cy="170" r="160" fill="url(#bg)"/>
  <circle cx="170" cy="170" r="148" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.3"/>
  <circle cx="170" cy="170" r="140" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <!-- Huawei petal logo simplified -->
  <g transform="translate(170, 85)" opacity="0.9">
    <ellipse cx="0" cy="-8" rx="8" ry="18" fill="#ffffff" transform="rotate(0)"/>
    <ellipse cx="0" cy="-8" rx="8" ry="18" fill="#ffffff" transform="rotate(45)"/>
    <ellipse cx="0" cy="-8" rx="8" ry="18" fill="#ffffff" transform="rotate(90)"/>
    <ellipse cx="0" cy="-8" rx="8" ry="18" fill="#ffffff" transform="rotate(135)"/>
    <ellipse cx="0" cy="-8" rx="8" ry="18" fill="#ffffff" transform="rotate(180)"/>
    <ellipse cx="0" cy="-8" rx="8" ry="18" fill="#ffffff" transform="rotate(225)"/>
    <ellipse cx="0" cy="-8" rx="8" ry="18" fill="#ffffff" transform="rotate(270)"/>
    <ellipse cx="0" cy="-8" rx="8" ry="18" fill="#ffffff" transform="rotate(315)"/>
  </g>
  <!-- HUAWEI text -->
  <g transform="translate(170, 160)" text-anchor="middle">
    <text font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" letter-spacing="3">HUAWEI</text>
  </g>
  <!-- HCNA text -->
  <g transform="translate(170, 205)" text-anchor="middle">
    <text font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff">HCNA</text>
    <text y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.7" letter-spacing="1">ROUTING &amp; SWITCHING</text>
  </g>
</svg>
