name: Update star badges

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update star badges in README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import json, re, subprocess
          from collections import defaultdict

          result = subprocess.run(
              ["gh", "repo", "list", "GeiserX", "--source", "--no-archived",
               "--visibility", "public", "--limit", "200",
               "--json", "name,stargazerCount,primaryLanguage"],
              capture_output=True, text=True, check=True
          )
          repos = [r for r in json.loads(result.stdout) if r["name"] != "GeiserX"]

          STAR_COLOR = "FFD700"

          # ── Badge styles: (color, shields.io logo) ──────────────────────
          GROUP_STYLES = {
              # Platform / ecosystem groups (override primary language)
              "GitHub": ("555555", "github"),
              "Grafana": ("F46800", "grafana"),
              "Jellyfin": ("00A4DC", "jellyfin"),
              "Home Assistant": ("18BCF2", "homeassistant"),
              "MCP": ("8B5CF6", "modelcontextprotocol"),
              "Claude Code": ("D97757", "claude"),
              "n8n": ("EA4B71", "n8n"),
              "Android": ("34A853", "android"),
              "Runtipi": ("27B648", "linux"),
              "Unraid": ("F15A2C", "unraid"),
              "Kubernetes": ("326CE5", "kubernetes"),
              "Docker": ("384d54", "docker"),
              "Raspberry Pi": ("A22846", "raspberrypi"),
              "VS Code": ("007ACC", "vscodium"),
              "GitHub Actions": ("2088FF", "githubactions"),
              "Ansible": ("EE0000", "ansible"),
              "Homebrew": ("FBB040", "homebrew"),
              "Browser Extensions": ("4285F4", "googlechrome"),
              "Ghost": ("15171A", "ghost"),
              "Awesome": ("FC60A8", "awesomelists"),
              # Language groups (fallback)
              "Python": ("3572A5", "python"),
              "TypeScript": ("3178C6", "typescript"),
              "JavaScript": ("f1e05a", "javascript"),
              "Go": ("00ADD8", "go"),
              "Swift": ("F05138", "swift"),
              "Kotlin": ("7F52FF", "kotlin"),
              "Ruby": ("701516", "ruby"),
              "Shell": ("89e051", "gnubash"),
              "C#": ("178600", "dotnet"),
              "R": ("198CE7", "r"),
              "HTML": ("e34c26", "html5"),
              "HCL": ("844FBA", "terraform"),
              "Dockerfile": ("384d54", "docker"),
              "Handlebars": ("f7931e", "handlebarsdotjs"),
              "Makefile": ("89e051", "gnu"),
              "Go Template": ("00ADD8", "go"),
              "Java": ("b07219", "openjdk"),
              "Scala": ("c22d40", "scala"),
              "Rust": ("dea584", "rust"),
              "C": ("555555", "c"),
              "C++": ("f34b7d", "cplusplus"),
              "Zig": ("F7A41D", "zig"),
              "Haskell": ("5e5086", "haskell"),
              "Elixir": ("6e4a7e", "elixir"),
              "Lua": ("000080", "lua"),
              "Perl": ("0298c3", "perl"),
              "PHP": ("4F5D95", "php"),
              "PowerShell": ("012456", "powershell"),
              "Nix": ("7e7eff", "nixos"),
              "Vue": ("4FC08D", "vuedotjs"),
              "Svelte": ("ff3e00", "svelte"),
              "CSS": ("563d7c", "css3"),
              "SCSS": ("c6538c", "sass"),
              "Astro": ("ff5a03", "astro"),
              "Jupyter Notebook": ("DA5B0B", "jupyter"),
              "Julia": ("9558B2", "julia"),
              "Dart": ("00B4AB", "dart"),
              "Objective-C": ("438eff", "apple"),
              "TeX": ("3D6117", "latex"),
              "Groovy": ("4298b8", "apachegroovy"),
              "Clojure": ("db5855", "clojure"),
              "OCaml": ("3be133", "ocaml"),
              "F#": ("b845fc", "fsharp"),
              "Erlang": ("B83998", "erlang"),
              "ElectroBun": ("111111", "bun"),
          }
          DEFAULT_STYLE = ("555555", "github")

          # ── Routing: repo → group ──────────────────────────────────────
          def get_group(repo):
              name = repo["name"]
              lang = repo["primaryLanguage"]["name"] if repo["primaryLanguage"] else None

              # ─ Curated lists ─
              if name.startswith("awesome-"):
                  return "Awesome"

              # ─ Platform / ecosystem (checked first, overrides language) ─

              # Grafana
              if name == "grafana-rightsizing-dashboard":
                  return "Grafana"

              # Runtipi
              if name == "runtipi-appstore":
                  return "Runtipi"

              # Unraid
              if name == "docker-templates":
                  return "Unraid"

              # Raspberry Pi / IoT
              if name.startswith("PiSpot-"):
                  return "Raspberry Pi"

              # Jellyfin plugins & tools
              if name in (
                  "whisper-subs", "smart-covers", "quality-gate",
                  "jellyfin-encoder", "jellyfin-telegram-channel-sync",
              ):
                  return "Jellyfin"

              # MCP servers
              if name.endswith("-mcp"):
                  return "MCP"

              # n8n community nodes
              if name.startswith("n8n-nodes-"):
                  return "n8n"

              # Home Assistant integrations
              if name.endswith("-ha"):
                  return "Home Assistant"

              # Android apps
              if name.endswith("-android"):
                  return "Android"

              # VS Code extensions
              if name.endswith("-vscode"):
                  return "VS Code"

              # Claude Code plugins
              if name.startswith("cc-"):
                  return "Claude Code"

              # GitHub Actions
              if name.endswith("-action"):
                  return "GitHub Actions"

              # Homebrew taps
              if name.startswith("homebrew-"):
                  return "Homebrew"

              # Ansible
              if name.endswith("-ansible"):
                  return "Ansible"

              # Docker / Helm containers
              if name.endswith("-container"):
                  return "Docker"

              # Kubernetes tools
              if name in (
                  "redis-operator", "k8s-dockerhub-detector",
                  "cloud-tests-velero",
              ):
                  return "Kubernetes"

              # Browser extensions
              if name == "github-toggle-all-details":
                  return "Browser Extensions"

              # ─ Special overrides ─
              OVERRIDES = {
                  "AgentTap": "ElectroBun",
                  "ghost-github-portfolio": "Ghost",
              }
              if name in OVERRIDES:
                  return OVERRIDES[name]

              # ─ Fallback to primary language ─
              if lang in ("Go Template", "Makefile"):
                  return lang
              return lang or "GitHub"

          # ── Group display order ────────────────────────────────────────
          GROUP_ORDER = [
              # Main products (contrast-ordered by color)
              "Python",                   # 3572A5 blue
              "Swift",                    # F05138 red-orange
              "ElectroBun",               # 111111 black
              "TypeScript",               # 3178C6 blue
              "Shell",                    # 89e051 green
              "Go",                       # 00ADD8 cyan
              "JavaScript",               # f1e05a yellow
              # Platform integrations (contrast-ordered)
              "Jellyfin",                 # 00A4DC blue
              "n8n",                      # EA4B71 pink
              "Home Assistant",           # 18BCF2 light blue
              "MCP",                      # 8B5CF6 purple
              "Claude Code",              # D97757 terracotta
              "Android",                  # 34A853 green
              # App stores & templates
              "Unraid",                   # F15A2C orange
              # Infrastructure
              "Kubernetes",               # 326CE5 blue
              "Runtipi",                  # 27B648 green
              "Grafana",                  # F46800 orange
              "Docker",                   # 384d54 dark
              "Ghost",                    # 15171A dark
              # Dev tools (contrast-ordered)
              "VS Code",                  # 007ACC blue
              "Ansible",                  # EE0000 red
              "Awesome",                  # FC60A8 pink
              "GitHub Actions",           # 2088FF blue
              "Homebrew",                 # FBB040 yellow
              "Browser Extensions",       # 4285F4 google blue
              # IoT
              "Raspberry Pi",             # A22846 magenta
              # Remaining languages / fallback
              "R", "C#", "HTML", "Handlebars", "GitHub",
          ]

          # ── Group repos ────────────────────────────────────────────────
          groups = defaultdict(list)
          for r in repos:
              groups[get_group(r)].append(r)

          # Merge tiny language groups into closest match
          for tiny in ["Go Template", "Makefile"]:
              if tiny in groups and len(groups[tiny]) <= 2:
                  groups["Go"].extend(groups.pop(tiny))

          # Sort repos within each group: stars desc, then name asc
          for g in groups:
              groups[g].sort(key=lambda x: (-x["stargazerCount"], x["name"].lower()))

          # Build ordered list: fixed order first, then new groups alphabetically
          ordered = []
          seen = set()
          for g in GROUP_ORDER:
              if g in groups:
                  ordered.append((g, groups[g]))
                  seen.add(g)
          for g in sorted(groups.keys()):
              if g not in seen:
                  ordered.append((g, groups[g]))

          def make_badge(repo, group):
              name = repo["name"]
              count = repo["stargazerCount"]
              color, logo = GROUP_STYLES.get(group, DEFAULT_STYLE)
              label = name.replace("-", "--")

              if count >= 2:
                  src = f"https://img.shields.io/badge/{label}-★_{count}-{STAR_COLOR}?style=flat-square&logo={logo}&logoColor=white&labelColor={color}"
              else:
                  src = f"https://img.shields.io/badge/{label}-{color}?style=flat-square&logo={logo}&logoColor=white"

              return f'<a href="https://github.com/GeiserX/{name}"><img src="{src}" alt="{name}"></a>'

          badge_groups = []
          for group, repos_list in ordered:
              badges = [make_badge(r, group) for r in repos_list]
              badge_groups.append("\n".join(badges))

          new_block = "\n<br/>\n".join(badge_groups)

          with open("README.md") as f:
              content = f.read()

          pm = re.search(
              r'(## Projects\s*\n+<p align="center">\n)(.*?)(\n</p>)',
              content, re.DOTALL
          )
          if not pm:
              print("No Projects section found")
              exit(0)

          new_content = content[:pm.start()] + pm.group(1) + new_block + pm.group(3) + content[pm.end():]

          if new_content != content:
              with open("README.md", "w") as f:
                  f.write(new_content)
              print("README updated")
          else:
              print("No changes needed")

      - uses: peter-evans/create-pull-request@v7
        id: create-pr
        with:
          commit-message: "Update star badges"
          title: "Update star badges"
          body: "Automated hourly update of star count badges in profile README."
          branch: automated/star-badges
          delete-branch: true

      - name: Merge PR
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --squash --delete-branch
