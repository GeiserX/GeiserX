name: Update star badges

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update star badges in README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import json, re, subprocess

          result = subprocess.run(
              ["gh", "repo", "list", "GeiserX", "--source", "--no-archived",
               "--limit", "200", "--json", "name,stargazerCount"],
              capture_output=True, text=True, check=True
          )
          stars = {r["name"]: r["stargazerCount"] for r in json.loads(result.stdout)}

          with open("README.md") as f:
              content = f.read()

          # Find the Projects <p> block
          pm = re.search(
              r'(## Projects\s*\n+<p align="center">\n)(.*?)(\n</p>)',
              content, re.DOTALL
          )
          if not pm:
              print("No Projects section found")
              exit(0)

          before = content[:pm.start()] + pm.group(1)
          block = pm.group(2)
          after = pm.group(3) + content[pm.end():]

          # Split badges into groups by <br/>
          groups = []
          current = []
          for line in block.split("\n"):
              stripped = line.strip()
              if stripped == "<br/>":
                  if current:
                      groups.append(current)
                      current = []
              elif stripped:
                  current.append(stripped)
          if current:
              groups.append(current)

          repo_re = re.compile(r'href="https://github\.com/GeiserX/([^"]+)"')

          STAR_COLOR = "FFD700"

          def update_badge_stars(html, repo):
              count = stars.get(repo, 0)
              def replacer(m):
                  full = m.group(1)
                  parts = full.split("?", 1)
                  p = parts[0]
                  params_str = parts[1] if len(parts) > 1 else ""

                  # Extract and remove labelColor from params
                  lc_match = re.search(r"&labelColor=[0-9a-fA-F]{6}", params_str)
                  original_color = None
                  if lc_match:
                      original_color = lc_match.group(0).split("=")[1]
                      params_str = params_str.replace(lc_match.group(0), "")
                  params = "?" + params_str if params_str else ""

                  # Parse path: LABEL-COLOR or LABEL-★_N-COLOR
                  cm = re.match(r"^(.+)-([0-9a-fA-F]{6})$", p)
                  if not cm:
                      return m.group(0)
                  label, color = cm.group(1), cm.group(2)

                  # Recover original color if this was a star badge
                  if color == STAR_COLOR and original_color:
                      color = original_color

                  # Strip any existing star segment (both formats)
                  label = re.sub(r"[-_]★_\d+$", "", label)

                  if count >= 5:
                      return f"badge/{label}-★_{count}-{STAR_COLOR}{params}&labelColor={color}"
                  return f"badge/{label}-{color}{params}"
              return re.sub(r'badge/([^"]+)', replacer, html)

          new_groups = []
          for group in groups:
              items = []
              for badge in group:
                  rm = repo_re.search(badge)
                  repo = rm.group(1) if rm else ""
                  count = stars.get(repo, 0) if repo else 0
                  updated = update_badge_stars(badge, repo) if repo else badge
                  items.append((count, repo.lower(), updated))
              # Sort by stars descending, then name ascending
              items.sort(key=lambda x: (-x[0], x[1]))
              new_groups.append([i[2] for i in items])

          new_block = "\n<br/>\n".join("\n".join(g) for g in new_groups)
          new_content = before + new_block + after

          if new_content != content:
              with open("README.md", "w") as f:
                  f.write(new_content)
              print("README updated")
          else:
              print("No changes needed")

      - uses: peter-evans/create-pull-request@v7
        id: create-pr
        with:
          commit-message: "Update star badges"
          title: "Update star badges"
          body: "Automated daily update of star count badges in profile README."
          branch: automated/star-badges
          delete-branch: true

      - name: Merge PR
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --squash --delete-branch
