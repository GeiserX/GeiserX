name: Latest blog post workflow
on:
  schedule:
    - cron: '11 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6

      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://geiser.cloud/feed/"
